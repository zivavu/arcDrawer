<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>ProbabilityDrawer</title>
        <script defer src="canvas.js" type="module"></script>
        <script defer src="settings.js" type="module"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap" rel="stylesheet" />
    </head>
    <body>
        <div id="canvas-container">
            <canvas class="canvas"></canvas>
        </div>
        <div id="settings-menu">
            <div id="aspects">
                <button id="arc-settings-button">ARC</button>
                <button id="shadow-settings-button">SHADOW</button>
            </div>
            <div id="sub-settings-container">
                <div id="arc-settings" class="sub-settings">
                    <hr />
                    <label for="line-width-range">Line Width</label>
                    <input type="range" id="line-width-range" min="0.05" max="1.7" step="0.02" value="3" />

                    <label for="strokes-number-range">Number of Lines</label>
                    <input type="range" id="strokes-number-range" min="1" max="30" step="1" value="7" />

                    <label for="line-decay-range">Line Decay</label>
                    <input type="range" id="line-decay-range" min="0" max="2" step="0.02" />
                    <hr />

                    <label for="previous-offset-multiplier">Arc Stability</label>
                    <input type="range" id="prev-offset-multiplier-range" min="0.6" max="2" step="0.05" value="0" />

                    <label for="offset-weight-range">Arc Unstability</label>
                    <input type="range" id="offset-weight-range" min="1" max="90" step="0.5" value="3" />
                    <hr />

                    <label for="blur-range">Blur</label>
                    <input type="range" id="blur-range" min="0" max="10" step="0.1" value="0" />
                    <hr />

                    <label for="color-picker">Arc Color</label>
                    <input id="color-picker" type="color" />
                </div>

                <div id="shadow-settings" class="sub-settings"></div>
            </div>

            <input type="button" id="save-brush-button" value="Save Brush" />
            <div id="saved-brushes"></div>
            <div id="settings-hide-button">></div>
        </div>
        <div id="settings-show-button"></div>
    </body>
</html>
